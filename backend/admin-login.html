<!DOCTYPE html>
<html>
<head>
    <title>SIMTAR Admin Login</title>
</head>

<body>

<h2>Admin Login</h2>

<input
type="text"
id="user"
placeholder="Username"
>

<br><br>

<input
type="password"
id="pass"
placeholder="Password"
>

<br><br>

<button onclick="login()">
Login
</button>

<script>

function login(){

fetch("https://simtar.onrender.com/admin/login", {

method: "POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({

username:
document.getElementById("user").value,

password:
document.getElementById("pass").value

})

})
.then(res => res.json())
.then(data => {

console.log(data);

if(data.token){

localStorage.setItem(
"token",
data.token
);
window.location.href =
"/admin-dashboard.html";

}else{

alert(data.message);

}

})
.catch(error => {

console.log(error);
alert("Login error");

});

}

</script>

</body>
</html>

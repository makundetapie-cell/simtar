<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Portal - SIMTAR</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:white;
width:100%;
max-width:500px;
padding:40px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.logo{
text-align:center;
font-size:28px;
font-weight:700;
color:#444;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#777;
margin-bottom:30px;
}

input{
width:100%;
padding:15px;
margin-bottom:20px;
border:1px solid #ddd;
border-radius:12px;
font-size:16px;
outline:none;
}

input:focus{
border-color:#777;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:#555;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#333;
}

.back-btn{
display:block;
text-align:center;
margin-top:20px;
text-decoration:none;
font-weight:600;
color:#555;
}

.note{
margin-top:20px;
text-align:center;
font-size:14px;
color:#777;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
SIMTAR MEDICAL LABORATORIES
</div>

<p class="subtitle">
Secure Patient Results Portal
</p>

<input
type="text"
id="patientId"
placeholder="Patient ID"
>

<input
type="password"
id="password"
placeholder="Password"
>

<button onclick="loginPatient()">
View Results
</button>

<a href="index.html" class="back-btn">
← Back to Home
</a>

<p class="note">
Your medical records are secure and confidential.
</p>

</div>

<script>

function loginPatient(){

fetch(
"https://simtar.onrender.com/patient/login",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({

patientId:
document.getElementById(
"patientId"
).value,

password:
document.getElementById(
"password"
).value

})

})
.then(res => res.json())
.then(data => {

if(data.success){

window.open(
"https://simtar.onrender.com" +
data.pdf,
"_blank"
);

}else{

alert(
"Incorrect patient ID or password"
);

}

})
.catch(err => {

console.log(err);
alert("Login failed");

});

}

</script>

</body>
</html>
